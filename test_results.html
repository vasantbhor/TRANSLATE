            { marathi: 'इंजिनीअरिंग', expected: 'Engineering' },
            { marathi: 'बोऱ्हाडे', expected: 'Borhade' },
            { marathi: 'राम', expected: 'Ram' },
            { marathi: 'रामा', expected: 'Rama' },
            { marathi: 'मित्र', expected: 'Mitra' },
            { marathi: 'अंबिका', expected: 'Ambik' },

            { marathi: 'अक्षदा', expected: 'Akshada' },
            { marathi: 'Akshda', expected: 'Akshada' }
        ];

        const resultsDiv = document.getElementById('results');
        let passed = 0;

        tests.forEach(test => {
            const actual = transliterateMarathiToEnglish(test.marathi);
            const isMatch = actual.toLowerCase() === test.expected.toLowerCase();
            const p = document.createElement('p');
            if (isMatch) {
                p.innerHTML = `✅ [PASS] ${test.marathi} -> <strong>${actual}</strong> (Expected: ${test.expected})`;
                p.style.color = 'green';
                passed++;
            } else {
                p.innerHTML = `❌ [FAIL] ${test.marathi} -> <strong>${actual}</strong> (Expected: ${test.expected})`;
                p.style.color = 'red';
            }
            resultsDiv.appendChild(p);
        });

        const summary = document.createElement('h2');
        summary.textContent = `Summary: ${passed}/${tests.length} tests passed.`;
        resultsDiv.appendChild(summary);
    </script>
